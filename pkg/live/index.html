<!doctype html>
<html>
  <head>
    <title>go-pen</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
      header { display: flex; align-items: center; gap: 16px; padding: 12px 20px; background: #252525; border-bottom: 1px solid #333; }
      header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
      select { background: #333; color: #e0e0e0; border: 1px solid #555; border-radius: 4px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
      select:hover { border-color: #888; }
      .controls { display: flex; align-items: center; gap: 12px; margin-left: auto; }
      .controls label { font-size: 13px; color: #999; }
      .controls input[type=range] { width: 120px; }
      #status { font-size: 12px; padding: 2px 8px; border-radius: 3px; }
      .status-ready { background: #1a3a1a; color: #4ade80; }
      .status-building { background: #3a3a1a; color: #facc15; }
      .status-error { background: #3a1a1a; color: #f87171; }
      .hidden { display: none; }
      main { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 20px; }
      #image { max-width: 100%; max-height: 100%; transition: transform 0.1s; background: white; }
      #error { display: none; color: #f87171; font-size: 14px; text-align: center; padding: 40px; }
    </style>
  </head>
  <body>
    <header>
      <h1>go-pen</h1>
      <select id="sketch" class="hidden"></select>
      <div class="controls">
        <span id="status" class="status-building">connecting…</span>
        <label>zoom</label>
        <input type="range" min="10" max="200" value="100" id="zoom"
          oninput="document.getElementById('image').style.transform='scale('+this.value/100+')'">
      </div>
    </header>
    <main>
      <img id="image" />
      <div id="error"></div>
    </main>

    <script>
      var image = document.getElementById("image");
      var errorDiv = document.getElementById("error");
      var statusEl = document.getElementById("status");
      var sketchSelect = document.getElementById("sketch");
      var galleryMode = false;

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls;
      }

      function showImage(file) {
        image.src = "/out/" + file + "?t=" + Date.now();
        image.style.display = "block";
        errorDiv.style.display = "none";
      }

      function handleEvent(ev) {
        switch (ev.type) {
          case "ready":
            setStatus("ready", "status-ready");
            showImage(ev.file);
            break;
          case "building":
            setStatus("building…", "status-building");
            errorDiv.style.display = "none";
            break;
          case "error":
            setStatus("error", "status-error");
            errorDiv.textContent = ev.msg;
            errorDiv.style.display = "block";
            break;
        }
      }

      // SSE: server pushes build state
      function connectSSE() {
        var es = new EventSource("/events");
        es.onmessage = function(msg) {
          handleEvent(JSON.parse(msg.data));
        };
        es.onerror = function() {
          setStatus("disconnected", "status-error");
        };
      }

      // Gallery mode: populate picker and wire up selection
      function initGallery(sketches, currentSketch) {
        galleryMode = true;
        sketchSelect.classList.remove("hidden");
        sketchSelect.innerHTML = "";
        sketches.forEach(function(s) {
          var opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          sketchSelect.appendChild(opt);
        });

        // Set current selection
        if (currentSketch) {
          sketchSelect.value = currentSketch;
        }

        sketchSelect.addEventListener("change", function() {
          var name = this.value;
          setStatus("building…", "status-building");
          image.style.display = "none";
          errorDiv.style.display = "none";
          fetch("/api/select?name=" + encodeURIComponent(name));
        });
      }

      // Boot: fetch initial state, start SSE, optionally trigger first build
      function boot() {
        fetch("/api/sketches").then(function(r) {
          return r.ok ? r.json() : null;
        }).then(function(sketches) {
          return fetch("/api/state").then(function(r) {
            return r.json();
          }).then(function(state) {
            // Start SSE first so we don't miss events
            connectSSE();

            if (sketches && sketches.length > 0) {
              initGallery(sketches, state.sketch);

              // If no image yet, select the first sketch to trigger a build
              if (state.event.type !== "ready") {
                var pick = sketches[0];
                sketchSelect.value = pick;
                fetch("/api/select?name=" + encodeURIComponent(pick));
              }
            }

            // Apply whatever the server's current state is
            if (state.event.type) {
              handleEvent(state.event);
            }
          });
        }).catch(function(err) {
          setStatus("error", "status-error");
          errorDiv.textContent = "Failed to connect: " + err;
          errorDiv.style.display = "block";
        });
      }

      boot();
    </script>
  </body>
</html>
